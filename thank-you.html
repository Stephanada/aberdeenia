<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You – Aberdeen Investment Advisors LLC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="images/favicon.ico.png" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .thankyou-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 24px;
      background: #111;
      color: #fff;
    }
    .thankyou-page .logo img { height: 40px; margin-bottom: 48px; }
    .thankyou-page h1 {
      font-size: 2rem;
      font-weight: 200;
      letter-spacing: 0.2em;
      margin-bottom: 16px;
    }
    .thankyou-page p {
      font-size: 0.95rem;
      color: #aaa;
      max-width: 480px;
      line-height: 1.8;
    }
    .thankyou-page a.back-link {
      display: inline-block;
      margin-top: 36px;
      padding: 12px 36px;
      border: 1px solid #c8a96e;
      color: #c8a96e;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      transition: background 0.2s, color 0.2s;
    }
    .thankyou-page a.back-link:hover {
      background: #c8a96e;
      color: #111;
    }
  </style>
</head>
<body>
  <div class="thankyou-page">
    <div class="logo">
      <img src="images/AberdeeniaLogo.png.webp" alt="Aberdeen Investment Advisors" />
    </div>
    <h1>Thank You</h1>
    <p>Your message has been received. We'll be in touch shortly to discuss your project and portfolio needs.</p>
    <a class="back-link" href="index.html">← Return Home</a>
  </div>
</body>
</html>
